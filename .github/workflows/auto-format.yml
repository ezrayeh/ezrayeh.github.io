name: Compile LESS to CSS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Installs the official LESS engine compiler
      - name: Install LESS compiler
        run: npm install -g less

      # Automatically turns your style.less file into a readable style.css file
      - name: Compile LESS file
        run: lessc style.less style.css

      # Saves the new style.css file back to your repository automatically
      - name: Commit compiled CSS
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: automatically compiled style.less to style.css"
