name: Automatic Code Styling

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  format:
    runs-on: ubuntu-latest
    
    # Ensures GitHub Actions has the necessary token access to write back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # This targets your style.less file and any other stylesheets
      - name: Run Prettier Formatter
        run: npx prettier --write "**/style.less"

      - name: Commit formatted changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: automatic styling for style.less"
